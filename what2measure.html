<style>

/* =========================

========================= */

margin:0;
padding:0;

body{

/* =========================

.title{

.subtitle{

}

/* HOME BUTTON */

top:8px;
left:8px;

padding:4px 8px;
font-size:11px;

background:white;
color:black;

border:none;
border-radius:6px;

cursor:pointer;
width:auto;
}


/* =========================
   LAYOUT
========================= */

.container{
max-width:800px;
margin:auto;
padding:25px;
}


.card{
background:white;
padding:25px;
margin:20px 0;
border-radius:16px;
box-shadow:0 6px 18px rgba(0,0,0,0.08);
}


/* =========================
   TEXT
========================= */

font-size:22px;
margin-bottom:5px;
}

.helper{
font-size:14px;
color:#666;
margin-bottom:10px;
}


/* =========================
   INPUTS
========================= */

input, select{

width:100%;
padding:12px;

margin:8px 0;

border-radius:8px;

border:1px solid #ddd;

font-size:14px;

}


/* =========================
   BUTTONS
========================= */

button{

width:100%;

padding:12px;

margin-top:10px;

background:#4f46e5;

color:white;

border:none;

border-radius:10px;

cursor:pointer;

font-size:15px;

font-weight:bold;

}


button:hover{

background:#372fc7;

}


/* SMALL BUTTON */

.small-btn{

width:auto;

padding:6px 10px;

font-size:12px;

border-radius:8px;

}



/* =========================
   RESULT
========================= */

.result{

background:#fff7cc;

padding:18px;

border-radius:12px;

margin-top:15px;

font-size:18px;

font-weight:bold;

text-align:center;

}


/* =========================
   FOOTER
========================= */

.footer{

margin-top:50px;

background:#222;

color:white;

text-align:center;

padding:20px;

font-size:13px;

border-top:3px solid #111;

}


</style>

</head>

<!-- MEASURE -->

<div class="card">

<p class="helper">
How many phones long is the object?
</p>


<input 
id="phoneCount"
type="number"
placeholder="Example: 5"
>


<button onclick="calculate()">
Calculate
</button>

<script>


let phoneLength = 14.66;



function changePhone(){


let selected = document.getElementById("phoneSelect").value;


let manual = document.getElementById("manualLength");



if(selected === "manual"){


manual.style.display="block";


}else{


manual.style.display="none";


phoneLength = Number(selected);


}


}




function calculate(){



if(document.getElementById("phoneSelect").value==="manual"){


phoneLength = Number(document.getElementById("manualLength").value);


}



let count = Number(document.getElementById("phoneCount").value);



if(!phoneLength || !count) return;



let cm = phoneLength * count;


let inch = cm / 2.54;



document.getElementById("result").innerHTML =

cm.toFixed(2) + " cm<br>" +

inch.toFixed(2) + " inches";



}





function clearAll(){


phoneLength = 14.66;


document.getElementById("phoneSelect").selectedIndex=0;


document.getElementById("manualLength").value="";

document.getElementById("manualLength").style.display="none";


document.getElementById("phoneCount").value="";


document.getElementById("result").innerHTML =

"Waiting for measurement...";


}


</script>
