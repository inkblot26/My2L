<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>What2Remember - my2L</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:#f5f7fb;
color:#333;
}

/* HEADER */
header{
background:linear-gradient(135deg,#4f46e5,#7c3aed);
color:white;
padding:50px 20px;
text-align:center;
position:relative;
}

.title{
font-size:44px;
font-weight:bold;
}

.title .what{
color:white;
}

.title .remember{
color:#ffd700;
}

.subtitle{
font-size:18px;
margin-top:10px;
}


/* HOME BUTTON */
.home-btn{
position:absolute;
top:8px;
left:8px;
padding:4px 8px;
font-size:11px;
background:white;
color:black;
border:none;
border-radius:6px;
cursor:pointer;
width:auto;
}

/* LAYOUT */

.container{
max-width:900px;
margin:auto;
padding:25px;
}


.card{
background:white;
padding:25px;
margin:20px 0;
border-radius:16px;
box-shadow:0 6px 18px rgba(0,0,0,0.08);
}


/* INPUT */
input, textarea{
width:100%;
padding:12px;
margin:8px 0;
border-radius:8px;
border:1px solid #ddd;
font-size:14px;
}

textarea{
height:120px;
resize:none;
}


/* BUTTON */
button{
width:100%;
padding:12px;
margin-top:10px;
background:#4f46e5;
color:white;
border:none;
border-radius:10px;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#372fc7;
}

/* NOTE */
.note{
background:#eef6ff;
padding:15px;
margin-top:15px;
border-radius:12px;
white-space:pre-line;
color:#333;
}

.note-title{
font-weight:bold;
font-size:18px;
display:inline;
}

.note-text{
display:inline;
color:#555;
}

.small-btn{
width:auto;
padding:6px 10px;
font-size:12px;
margin-right:5px;
margin-top:8px;
}


/* RESULT */
.footer{
margin-top:50px;
background:#222;
color:white;
text-align:center;
padding:20px;
font-size:13px;
}

</style>
</head>

<body>
<header>
<button class="home-btn" onclick="location.href='index.html'">
Home
</button>

<div class="title">
<span class="what">What</span><span class="remember">2Remember</span>
</div>

<p class="subtitle">
Save notes, reminders, and important information.
</p>
  
</header>

<div class="container">
<!-- CREATE NOTE -->
<div class="card">
<h2>Create Note</h2>
<input id="titleInput" placeholder="Note title">
<textarea id="textInput" placeholder="Write your note..."></textarea>
<button id="saveBtn" onclick="saveNote()">
Save Note
</button>
</div>

<!-- SAVED NOTES -->
<div class="card">
<h2>Saved Notes</h2>
<div id="noteList"></div>
<button onclick="clearAll()">
Clear All Notes
</button>
</div>

</div>

<div class="footer">
my2L © 2026 | Simple Tools For Everyday Life
</div>


<script>
let notes = JSON.parse(localStorage.getItem("my2L_notes")) || [];
let editIndex = -1;
function saveNote(){
let title = document.getElementById("titleInput").value;
let text = document.getElementById("textInput").value;
if(!title || !text) return;
if(editIndex === -1){
notes.push({
title:title,
text:text
});
}else{
notes[editIndex].title = title;
notes[editIndex].text = text;
editIndex = -1;
document.getElementById("saveBtn").innerText="Save Note";
}
localStorage.setItem(
"my2L_notes",
JSON.stringify(notes)
);
document.getElementById("titleInput").value="";
document.getElementById("textInput").value="";
loadNotes();
}

function loadNotes(){
let box=document.getElementById("noteList");
box.innerHTML="";
notes.forEach((n,i)=>{
box.innerHTML += `

<div class="note">

<div class="note-title">
${n.title}
</div>

<div class="note-text">
${n.text}
</div>

</div>


<button class="small-btn" onclick="editNote(${i})">
Edit
</button>


<button class="small-btn" onclick="deleteNote(${i})">
Delete
</button>

</div>`;
});
}

function editNote(i){
document.getElementById("titleInput").value =
notes[i].title;

document.getElementById("textInput").value =
notes[i].text;

editIndex = i;
  
document.getElementById("saveBtn").innerText =
"Update Note";

window.scrollTo({
top:0,
behavior:"smooth"
});
}

function deleteNote(i){
notes.splice(i,1);
localStorage.setItem(
"my2L_notes",
JSON.stringify(notes)
);
loadNotes();
}

function clearAll(){
notes=[];
localStorage.removeItem("my2L_notes");
loadNotes();
}

loadNotes();
</script>

</body>
</html>
