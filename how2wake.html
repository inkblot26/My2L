<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>How2Wake - my2L</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:#f5f7fb;
color:#333;
}

header{
background:linear-gradient(135deg,#4f46e5,#7c3aed);
color:white;
padding:50px 20px;
text-align:center;
position:relative;
}

.title{font-size:44px;font-weight:bold;}
.title .how{color:white;}
.title .wake{color:#ffd700;}

.home-btn{
position:absolute;
top:8px;
left:8px;
padding:4px 8px;
font-size:11px;
background:white;
color:black;
border:none;
border-radius:6px;
cursor:pointer;
width:auto;
}

.container{
max-width:800px;
margin:auto;
padding:25px;
}

.card{
background:white;
padding:25px;
margin:20px 0;
border-radius:16px;
box-shadow:0 6px 18px rgba(0,0,0,0.08);
}

input{
width:100%;
padding:12px;
margin:8px 0;
border-radius:8px;
border:1px solid #ddd;
}

button{
width:100%;
padding:12px;
margin-top:10px;
background:#4f46e5;
color:white;
border:none;
border-radius:10px;
font-weight:bold;
cursor:pointer;
}

button:hover{background:#372fc7;}

.result{
margin-top:15px;
padding:15px;
border-radius:12px;
text-align:center;
font-weight:bold;
}

.red{color:#dc2626;}
.green{color:#16a34a;}

.footer{
margin-top:50px;
background:#222;
color:white;
text-align:center;
padding:20px;
font-size:13px;
}
</style>
</head>

<body>

<header>
<button class="home-btn" onclick="location.href='index.html'">Home</button>

<div class="title">
<span class="how">How</span><span class="wake">2Wake</span>
</div>

<p>Set alarm → Solve 3 problems to stop it</p>
</header>

<div class="container">

<div class="card">
<h2>⏰ Set Alarm</h2>

<input type="time" id="alarmTime">
<button onclick="setAlarm()">Set Alarm</button>
<button onclick="clearAll()" style="background:#dc2626;">Clear All</button>

<p id="status"></p>
</div>

<div class="card">
<h2>🔴 Wake Up Challenge</h2>

<div id="questions"></div>

<button onclick="checkAnswers()">Stop Alarm</button>

<div id="result" class="result"></div>
</div>

</div>

<div class="footer">
my2L © 2026
</div>

<script>

let alarmTime = null;
let alarmTriggered = false;
let alarmInterval = null;
let problems = [];

let audio = new Audio("https://actions.google.com/sounds/v1/alarms/alarm_clock.ogg");

function setAlarm(){

if(alarmInterval) clearInterval(alarmInterval);

alarmTime = document.getElementById("alarmTime").value;
document.getElementById("status").innerText = "Alarm set for " + alarmTime;

alarmInterval = setInterval(checkAlarm, 1000);
}

function checkAlarm(){

if(alarmTriggered || !alarmTime) return;

let now = new Date();
let current = now.toTimeString().slice(0,5);

if(current === alarmTime){
triggerAlarm();
}
}

function triggerAlarm(){

alarmTriggered = true;

audio.loop = true;
audio.play();

// generate 3 + and - problems only
problems = [];

for(let i=0;i<3;i++){
let a = Math.floor(Math.random()*20)+1;
let b = Math.floor(Math.random()*20)+1;
let op = Math.random() > 0.5 ? "+" : "-";
let ans = op === "+" ? a + b : a - b;

problems.push({a,b,op,ans});
}

renderQuestions();

document.getElementById("status").innerText = "🚨 ALARM RINGING!";
}

function renderQuestions(){

let box = document.getElementById("questions");
box.innerHTML = "";

problems.forEach((p,i)=>{
box.innerHTML += `
<div>
<b>${p.a} ${p.op} ${p.b} = ?</b>
<input id="ans${i}" placeholder="Answer">
</div>
`;
});
}

function checkAnswers(){

let correct = true;

problems.forEach((p,i)=>{
let user = Number(document.getElementById("ans"+i).value);
if(user !== p.ans) correct = false;
});

let result = document.getElementById("result");

if(correct){
audio.pause();
audio.currentTime = 0;

alarmTriggered = false;

result.innerHTML = "✅ Alarm Stopped!";
result.className = "result green";
}else{
result.innerHTML = "❌ Wrong answers!";
result.className = "result red";
}
}

function clearAll(){

alarmTime = null;
alarmTriggered = false;

if(alarmInterval) clearInterval(alarmInterval);

audio.pause();
audio.currentTime = 0;

document.getElementById("alarmTime").value = "";
document.getElementById("status").innerText = "";
document.getElementById("questions").innerHTML = "";
document.getElementById("result").innerHTML = "";
}

</script>

</body>
</html>
