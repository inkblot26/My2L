<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>who2Pay - my2L</title>

<style>

/* =========================
   BASE
========================= */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:#f5f7fb;
color:#333;
line-height:1.5;
}

/* =========================
   HEADER (BIGGER + CLEAN)
========================= */
header{
background:linear-gradient(135deg,#4f46e5,#7c3aed);
color:white;
padding:50px 20px;
text-align:center;
position:relative;
}

.title{
font-size:44px;
font-weight:bold;
}

.title .who{color:white;}
.title .pay{color:#ffd700;}

.subtitle{
font-size:18px;
margin-top:10px;
opacity:0.95;
}

/* HOME BUTTON */
.home-btn{
position:absolute;
top:12px;
left:12px;

padding:4px 10px;
font-size:12px;
font-weight:bold;

background:white;
color:black;

border:none;
border-radius:7px;

cursor:pointer;
opacity:0.9;
}

.home-btn:hover{
opacity:1;
background:#f2f2f2;
}

/* =========================
   LAYOUT
========================= */
.container{
max-width:1000px;
margin:auto;
padding:25px;
}

/* BIGGER CARDS (IMPORTANT FIX) */
.card{
background:white;
padding:25px;
margin:20px 0;
border-radius:16px;
box-shadow:0 6px 18px rgba(0,0,0,0.08);
}

/* =========================
   TYPOGRAPHY
========================= */
h2{
font-size:22px;
margin-bottom:5px;
}

.helper{
font-size:14px;
color:#666;
margin-top:6px;
margin-bottom:10px;
}

/* =========================
   INPUTS (BIGGER TOUCH TARGETS)
========================= */
input,select,textarea{
width:100%;
padding:12px;
margin:6px 0;
border-radius:8px;
border:1px solid #ddd;
font-size:14px;
}

/* =========================
   BUTTONS
========================= */
button{
width:100%;
padding:12px;
margin-top:10px;

background:#4f46e5;
color:white;

border:none;
border-radius:10px;

cursor:pointer;
font-size:15px;
font-weight:bold;
}

button:hover{
background:#372fc7;
}

/* SMALL BUTTONS */
.small-btn{
width:auto;
padding:6px 10px;
font-size:12px;
margin-right:5px;
border-radius:8px;
}

/* =========================
   LISTS
========================= */
.member{
background:#eef0ff;
padding:10px;
margin:6px 0;
border-radius:10px;
font-weight:500;
}

.expense{
background:#fafafa;
padding:14px;
margin:12px 0;
border-radius:12px;
border:1px solid #eee;
}

/* =========================
   PEOPLE CHECKBOX FIX
========================= */
#participants{
margin-bottom:15px;
}

#participants label{
display:block;
padding:6px 0;
}

/* =========================
   COLORS
========================= */
.red{color:#dc2626;}
.green{color:#16a34a;}

/* =========================
   FOOTER (MATCH INDEX STYLE)
========================= */
.footer{
margin-top:50px;
background:#222;
color:white;
text-align:center;
padding:20px;
font-size:13px;
border-top:3px solid #111;
}

/* =========================
   MOBILE IMPROVEMENT (REAL FIX)
========================= */
@media (max-width:768px){

.title{
font-size:32px;
}

.subtitle{
font-size:14px;
}

.container{
padding:15px;
}

.card{
padding:18px;
margin:14px 0;
}

h2{
font-size:18px;
}

button{
font-size:14px;
padding:11px;
}

input,select,textarea{
font-size:14px;
padding:10px;
}

.small-btn{
font-size:11px;
}

}

</style>
</head>

<body>

<header>

<button class="home-btn" onclick="location.href='index.html'">
Home
</button>

<div class="title">
<span class="who">who</span><span class="pay">2Pay</span>
</div>

<p class="subtitle">
Split group expenses and easily know who owes who.
</p>

</header>

<div class="container">

<!-- MEMBERS -->
<div class="card">
<h2>Add Members</h2>
<p class="helper">Add people who are part of the group.</p>

<input id="memberName" placeholder="Enter name">
<button onclick="addMember()">Add Member</button>

<div id="members"></div>
</div>

<!-- EXPENSE -->
<div class="card">
<h2>Add Expense</h2>
<p class="helper">Fill in details, choose who paid, and select participants.</p>

<input id="expName" placeholder="Expense name">
<input id="amount" type="number" placeholder="Amount ₱">
<input id="date" type="date">
<textarea id="notes" placeholder="Notes (optional)"></textarea>

<p class="helper"><b>Who paid?</b></p>
<select id="payer"></select>

<p class="helper"><b>Who are involved?</b></p>
<div id="participants"></div>

<button onclick="addExpense()">Add / Update Expense</button>
</div>

<!-- EXPENSE LIST -->
<div class="card">
<h2>Expenses</h2>
<div id="expenseList"></div>
</div>

<!-- SUMMARY -->
<div class="card">
<h2>Member Summary</h2>
<div id="memberSummary"></div>
</div>

<!-- SETTLEMENT -->
<div class="card">
<h2>Settlement</h2>
<div id="settlement"></div>
</div>

</div>

<div class="footer">
my2L © 2026 | Simple Tools For Everyday Life
</div>

<script>

/* SAME JS (UNCHANGED) */

let members = [];
let expenses = [];
let editIndex = -1;
let debts = {};
   
function addMember(){
let name=document.getElementById("memberName").value;
if(!name) return;

members.push({name});
document.getElementById("memberName").value="";
initDebts();
renderAll();
}

function renderAll(){
renderMembers();
renderExpenseForm();
renderExpenses();
calculate();
renderSettlement();
}

function initDebts(){
debts = {};

members.forEach(m1=>{
    debts[m1.name] = {};
    members.forEach(m2=>{
        if(m1.name !== m2.name){
            debts[m1.name][m2.name] = 0;
        }
    });
});
}   

function renderMembers(){
let box=document.getElementById("members");
box.innerHTML="";
members.forEach(m=>{
box.innerHTML+=`<div class="member">${m.name}</div>`;
});
}

function renderExpenseForm(){
let payer=document.getElementById("payer");
let participants=document.getElementById("participants");

payer.innerHTML="";
participants.innerHTML="";

members.forEach((m,i)=>{
payer.innerHTML+=`<option value="${i}">${m.name}</option>`;
participants.innerHTML+=`
<label><input type="checkbox" value="${i}"> ${m.name}</label>
`;
});
}

function addExpense(){

let name=document.getElementById("expName").value;
let amount=Number(document.getElementById("amount").value);
let payer=Number(document.getElementById("payer").value);
let date=document.getElementById("date").value;
let notes=document.getElementById("notes").value;

let selected=[];
document.querySelectorAll("#participants input:checked")
.forEach(x=>selected.push(Number(x.value)));

if(!name||!amount||selected.length==0) return;

let data={name,amount,payer,selected,date,notes};

if(editIndex>=0){
expenses[editIndex]=data;
editIndex=-1;
}else{
expenses.push(data);
}
clearExpenseForm();
renderAll();
}

function renderExpenses(){
let box=document.getElementById("expenseList");
box.innerHTML="";

expenses.forEach((e,i)=>{
box.innerHTML+=`
<div class="expense">
<b>${e.name}</b> - ₱${e.amount}<br>
Paid by: ${members[e.payer]?.name}<br>
Shared: ${e.selected.map(x=>members[x]?.name).join(", ")}<br>

<button class="small-btn" onclick="editExpense(${i})">Edit</button>
<button class="small-btn" onclick="deleteExpense(${i})">Delete</button>
</div>
`;
});
}

function editExpense(i){
let e=expenses[i];
editIndex=i;

document.getElementById("expName").value=e.name;
document.getElementById("amount").value=e.amount;
document.getElementById("date").value=e.date;
document.getElementById("notes").value=e.notes;

document.querySelectorAll("#participants input")
.forEach(x=>{
x.checked=e.selected.includes(Number(x.value));
});
}

function deleteExpense(i){
expenses.splice(i,1);
renderAll();
}

function calculate(){

initDebts();

// STEP 1: build exact pairwise debts per expense
expenses.forEach(e=>{

    let payer = members[e.payer].name;
    let participants = e.selected.map(i => members[i].name);

    let split = e.amount / participants.length;

    participants.forEach(p => {

        if(p !== payer){
            debts[p][payer] += split;
        }
    });
});

// STEP 2: cancel mutual debts PER PAIR (IMPORTANT FIX)
simplifyDebts();

renderSettlement();
}

function simplifyDebts(){

members.forEach(a=>{
members.forEach(b=>{

    if(a.name === b.name) return;

    let ab = debts[a.name][b.name];
    let ba = debts[b.name][a.name];

    if(ab > 0 && ba > 0){

        let min = Math.min(ab, ba);

        debts[a.name][b.name] -= min;
        debts[b.name][a.name] -= min;
    }
});
});
}

function clearExpenseForm(){
document.getElementById("expName").value = "";
document.getElementById("amount").value = "";
document.getElementById("date").value = "";
document.getElementById("notes").value = "";

/* uncheck all participants */
document.querySelectorAll("#participants input")
.forEach(x => x.checked = false);

/* reset payer dropdown */
document.getElementById("payer").selectedIndex = 0;
}
   
function renderMemberSummary(){

let box=document.getElementById("memberSummary");
box.innerHTML="";


members.forEach((m,index)=>{


let html = `
<div class="member">

<b>${m.name}</b><br><br>
`;


/* find expenses where member is involved */
expenses.forEach(e=>{


if(e.selected.includes(index)){


let share = e.amount / e.selected.length;


html += `
<div>
${e.name} 
<br>
Share: ₱${share.toFixed(2)}
</div>

<br>
`;

}


});


html += `
</div>
`;


box.innerHTML += html;


});


}

function renderSettlement(){

let box = document.getElementById("settlement");
box.innerHTML = "";

members.forEach(from=>{
members.forEach(to=>{

let amt = debts[from.name][to.name];

if(amt > 0.01){

box.innerHTML += `
<p class="red">
${from.name} pays ${to.name} ₱${amt.toFixed(2)}
</p>
`;
}

});
});

}

</script>

</body>
</html>
