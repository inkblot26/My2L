<!DOCTYPE html>
<html>
<head>

<title>who2Pay - my2L</title>

<style>

/* RESET */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
background:#f5f7fb;
}

/* HEADER */
header{
background:linear-gradient(135deg,#4f46e5,#7c3aed);
color:white;
padding:40px 20px;
text-align:center;
position:relative;
}

/* TOP LEFT BUTTON */
.home-btn{
position:absolute;
top:20px;
left:20px;
padding:8px 14px;
background:white;
color:#4f46e5;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

.home-btn:hover{
background:#eee;
}

/* TITLE */
.title{
font-size:42px;
font-weight:bold;
}

.title .who{
color:white;
}

.title .pay{
color:#ffd700;
}

.subtitle{
font-size:18px;
margin-top:10px;
opacity:0.95;
}

/* CONTAINER */
.container{
max-width:900px;
margin:auto;
padding:20px;
}

/* CARDS */
.card{
background:white;
padding:20px;
margin:20px 0;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,.08);
}

/* INPUTS */
input,select,textarea,button{
width:100%;
padding:10px;
margin:5px 0;
}

/* BUTTONS */
button{
background:#4f46e5;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}

button:hover{
background:#3730a3;
}

.small-btn{
width:auto;
padding:5px 10px;
margin-right:5px;
font-size:12px;
}

/* LIST ITEMS */
.member{
background:#eee;
padding:8px;
margin:5px 0;
border-radius:8px;
}

.expense{
background:#fafafa;
padding:10px;
margin:10px 0;
border-radius:10px;
}

/* COLORS */
.red{ color:#dc2626; }
.green{ color:#16a34a; }

</style>

</head>

<body>

<!-- HEADER -->
<header>

<button class="home-btn" onclick="location.href='index.html'">
my2L
</button>

<div class="title">
<span class="who">who</span><span class="pay">2Pay</span>
</div>

<p class="subtitle">
Split group expenses and easily know who owes who.
</p>

</header>

<div class="container">

<!-- MEMBERS -->
<div class="card">

<h2>Add Members</h2>

<input id="memberName" placeholder="Member name">
<button onclick="addMember()">Add Member</button>

<div id="members"></div>

</div>

<!-- EXPENSE INPUT -->
<div class="card">

<h2>Add Expense</h2>

<input id="expName" placeholder="Expense name">

<input id="amount" type="number" placeholder="Amount ₱">

<select id="payer"></select>

<h3>Participants</h3>
<div id="participants"></div>

<input id="date" type="date">
<textarea id="notes" placeholder="Notes (optional)"></textarea>

<button onclick="addExpense()">Add / Update Expense</button>

</div>

<!-- EXPENSE LIST -->
<div class="card">
<h2>All Expenses</h2>
<div id="expenseList"></div>
</div>

<!-- MEMBER SUMMARY -->
<div class="card">
<h2>Member Summary</h2>
<div id="memberSummary"></div>
</div>

<!-- SETTLEMENT -->
<div class="card">
<h2>Final Settlement</h2>
<div id="settlement"></div>
</div>

</div>

<script>

let members = [];
let expenses = [];
let editIndex = -1;

/* ADD MEMBER */
function addMember(){
let name = document.getElementById("memberName").value;
if(!name) return;

members.push({
name,
paid:0,
share:0,
balance:0
});

document.getElementById("memberName").value="";
renderAll();
}

/* MASTER RENDER */
function renderAll(){
renderMembers();
renderExpenseForm();
renderExpenses();
calculate();
renderSettlement();
}

/* MEMBERS */
function renderMembers(){

let box = document.getElementById("members");
box.innerHTML="";

members.forEach(m=>{
box.innerHTML += `<div class="member">${m.name}</div>`;
});

}

/* FORM */
function renderExpenseForm(){

let payer = document.getElementById("payer");
let participants = document.getElementById("participants");

payer.innerHTML="";
participants.innerHTML="";

members.forEach((m,i)=>{

payer.innerHTML += `<option value="${i}">${m.name}</option>`;

participants.innerHTML += `
<label>
<input type="checkbox" value="${i}">
${m.name}
</label><br>
`;

});

}

/* ADD EXPENSE */
function addExpense(){

let name = document.getElementById("expName").value;
let amount = Number(document.getElementById("amount").value);
let payer = Number(document.getElementById("payer").value);
let date = document.getElementById("date").value;
let notes = document.getElementById("notes").value;

let selected=[];
document.querySelectorAll("#participants input:checked")
.forEach(x=>selected.push(Number(x.value)));

if(!name || !amount || selected.length==0) return;

let data = {name,amount,payer,selected,date,notes};

if(editIndex>=0){
expenses[editIndex]=data;
editIndex=-1;
}else{
expenses.push(data);
}

clearForm();
renderAll();
}

/* CLEAR */
function clearForm(){
document.getElementById("expName").value="";
document.getElementById("amount").value="";
document.getElementById("date").value="";
document.getElementById("notes").value="";
document.querySelectorAll("#participants input").forEach(x=>x.checked=false);
}

/* EXPENSE LIST */
function renderExpenses(){

let box = document.getElementById("expenseList");
box.innerHTML="";

expenses.forEach((e,i)=>{

box.innerHTML += `
<div class="expense">

<b>${e.name}</b> - ₱${e.amount}<br>
Paid by: ${members[e.payer]?.name}<br>
Shared: ${e.selected.map(x=>members[x]?.name).join(", ")}<br>
Date: ${e.date || "No date"}<br>
Notes: ${e.notes || ""}<br>

<button class="small-btn" onclick="editExpense(${i})">Edit</button>
<button class="small-btn" onclick="deleteExpense(${i})">Delete</button>

</div>
`;
});

}

/* EDIT */
function editExpense(i){

let e = expenses[i];
editIndex = i;

document.getElementById("expName").value = e.name;
document.getElementById("amount").value = e.amount;
document.getElementById("date").value = e.date;
document.getElementById("notes").value = e.notes;

document.querySelectorAll("#participants input")
.forEach(x=>{
x.checked = e.selected.includes(Number(x.value));
});

}

/* DELETE */
function deleteExpense(i){
expenses.splice(i,1);
renderAll();
}

/* CALCULATE */
function calculate(){

members.forEach(m=>{
m.paid=0;
m.share=0;
});

expenses.forEach(e=>{

let split = e.amount / e.selected.length;

members[e.payer].paid += e.amount;

e.selected.forEach(i=>{
members[i].share += split;
});

});

renderMemberSummary();
}

/* MEMBER SUMMARY */
function renderMemberSummary(){

let box = document.getElementById("memberSummary");
box.innerHTML="";

members.forEach(m=>{
m.balance = m.paid - m.share;

box.innerHTML += `
<div class="member">

<b>${m.name}</b><br>
Paid: ₱${m.paid.toFixed(2)}<br>
Share: ₱${m.share.toFixed(2)}<br>
Balance: ${m.balance>=0 ? "<span class='green'>" : "<span class='red'>"}
₱${m.balance.toFixed(2)}</span>

</div>
`;
});

}

/* SETTLEMENT */
function renderSettlement(){

let debtors = members.filter(m=>m.balance<0);
let creditors = members.filter(m=>m.balance>0);

let box = document.getElementById("settlement");
box.innerHTML="";

let i=0,j=0;

while(i<debtors.length && j<creditors.length){

let amt = Math.min(Math.abs(debtors[i].balance), creditors[j].balance);

box.innerHTML += `
<p class="red">
${debtors[i].name} pays ${creditors[j].name} ₱${amt.toFixed(2)}
</p>
`;

debtors[i].balance += amt;
creditors[j].balance -= amt;

if(debtors[i].balance===0) i++;
if(creditors[j].balance===0) j++;

}

}

</script>

</body>
</html>
