<!DOCTYPE html>
<html>

<head>

<title>who2Pay - my2L</title>

<style>

body{
font-family:Arial;
background:#f4f6fb;
padding:20px;
}


.container{
max-width:900px;
margin:auto;
}


.card{

background:white;
padding:20px;
margin:20px 0;
border-radius:15px;
box-shadow:0 5px 15px #ddd;

}


input,select,textarea,button{

width:100%;
padding:10px;
margin:5px 0;

}



button{

background:#4f46e5;
color:white;
border:none;
border-radius:8px;
cursor:pointer;

}


.member{

background:#eee;
padding:8px;
margin:5px;
border-radius:8px;

}


.expense{

background:#fafafa;
padding:15px;
margin:10px 0;
border-radius:10px;

}


.green{
color:green;
}

.red{
color:red;
}


</style>


</head>



<body>


<div class="container">


<h1>👥 who2Pay</h1>

<p>
Who owes who, and how much?
</p>



<div class="card">


<h2>Add Members</h2>


<input id="memberName"
placeholder="Member name">


<button onclick="addMember()">
Add Member
</button>


<div id="members"></div>


</div>






<div class="card">


<h2>Add Expense</h2>


<input id="expenseName"
placeholder="Expense name (Dinner, Gas...)">


<input id="amount"
type="number"
placeholder="Amount ₱">



<select id="payer">

<option>
Select payer
</option>

</select>




<h3>People involved</h3>

<div id="participants"></div>




<input id="date"
type="date">



<textarea id="notes"
placeholder="Notes (optional)">
</textarea>



<button onclick="addExpense()">

Add Expense

</button>



</div>





<div class="card">


<h2>Expenses</h2>


<div id="expenseList"></div>


</div>





<div class="card">


<h2>Payment Summary</h2>


<div id="paymentSummary"></div>



<h2>Final Settlement</h2>


<div id="settlement"></div>


<button onclick="calculate()">

Calculate

</button>


</div>





</div>





<script>


let members=[];

let expenses=[];




function addMember(){


let name=
document.getElementById("memberName").value;


if(!name)return;



members.push({

name:name,
paid:0,
share:0,
balance:0

});



document.getElementById("memberName").value="";


refresh();


}







function refresh(){


let list=
document.getElementById("members");


let payer=
document.getElementById("payer");


let participants=
document.getElementById("participants");



list.innerHTML="";

payer.innerHTML=
"<option>Select payer</option>";

participants.innerHTML="";




members.forEach((m,i)=>{



list.innerHTML+=`

<div class="member">

${m.name}

</div>

`;



payer.innerHTML+=`

<option value="${i}">
${m.name}
</option>

`;



participants.innerHTML+=`

<label>

<input type="checkbox"
value="${i}">

${m.name}

</label><br>

`;



});



}










function addExpense(){


let name=
document.getElementById("expenseName").value;


let amount=
Number(document.getElementById("amount").value);


let payer=
Number(document.getElementById("payer").value);


let date=
document.getElementById("date").value;


let notes=
document.getElementById("notes").value;




let selected=[];



document
.querySelectorAll("#participants input:checked")
.forEach(x=>{

selected.push(Number(x.value));

});



if(!name || !amount || selected.length==0)
return;



expenses.push({

name,
amount,
payer,
selected,
date,
notes

});



showExpenses();


}









function showExpenses(){


let box=
document.getElementById("expenseList");


box.innerHTML="";



expenses.forEach(e=>{


box.innerHTML+=`

<div class="expense">

<b>${e.name}</b>

<br>

₱${e.amount}

<br>

Paid by:
${members[e.payer].name}


<br>

Shared by:

${e.selected.map(i=>members[i].name).join(", ")}


<br>

${e.date}

<br>

${e.notes}


</div>


`;

});


}









function calculate(){



members.forEach(m=>{

m.paid=0;
m.share=0;

});




expenses.forEach(e=>{


let split=
e.amount/e.selected.length;



members[e.payer].paid+=e.amount;



e.selected.forEach(i=>{


members[i].share+=split;


});


});




let summary=
document.getElementById("paymentSummary");


summary.innerHTML="";



members.forEach(m=>{


m.balance=
m.paid-m.share;



summary.innerHTML+=`

<p>

${m.name}

paid ₱${m.paid.toFixed(2)}

</p>

`;


});





let debtors=
members.filter(x=>x.balance<0);


let creditors=
members.filter(x=>x.balance>0);



let output=
document.getElementById("settlement");


output.innerHTML="";



let d=0;
let c=0;



while(d<debtors.length && c<creditors.length){


let pay=
Math.min(
Math.abs(debtors[d].balance),
creditors[c].balance
);



output.innerHTML+=`

<p class="red">

${debtors[d].name}

pays

${creditors[c].name}

₱${pay.toFixed(2)}

</p>

`;



debtors[d].balance+=pay;

creditors[c].balance-=pay;



if(debtors[d].balance==0)d++;

if(creditors[c].balance==0)c++;


}



}



</script>


</body>

</html>
