.subtitle{

/* HOME */

padding:4px 8px;

.card{
background:white;
padding:25px;
margin:20px 0;
border-radius:16px;

input,select{

padding:12px;
margin:8px 0;
border-radius:8px;
border:1px solid #ddd;
font-size:14px;
}

/* BUTTON */
button{
width:100%;
padding:12px;
margin-top:10px;
background:#4f46e5;
color:white;
border:none;
border-radius:10px;
font-weight:bold;
cursor:pointer;
}
  
button:hover{
background:#372fc7;
}


/* ITEMS */
.item{
background:#eef0ff;
padding:12px;
margin:8px 0;
border-radius:10px;
display:flex;
justify-content:space-between;
align-items:center;
}

.small-btn{
width:auto;
padding:6px 10px;
font-size:12px;
margin:0;
}

/* CHECKLIST */
.shopping{
display:flex;
align-items:center;
background:#eef6ff;
padding:12px;
margin:8px 0;
border-radius:10px;
gap:10px;
}

/* CHECKBOX LEFT */
.shopping input[type="checkbox"]{
width:18px;
height:18px;
margin:0;
cursor:pointer;
}

/* ITEM NAME CENTER */
.shopping span{
flex:1;
font-size:15px;
}

/* DELETE RIGHT */
.shopping .small-btn{
margin:0;
}

.done{
text-decoration:line-through;
color:#777;
}

/* FOOTER */
.footer{
margin-top:50px;
background:#222;
color:white;
text-align:center;
padding:20px;
font-size:13px;
}

<div id="items"></div>

<button onclick="addCustom()">
Add Item
</button>
</div>

<!-- LIST -->
<div class="card">

let shoppingList = JSON.parse(localStorage.getItem("my2L_buy")) || [];

function showItems(){
let cat=document.getElementById("category").value;
let box=document.getElementById("items");
box.innerHTML="";
if(cat === "nothing"){
    return;
}
categories[cat].forEach(item=>{
box.innerHTML += `
<div class="item">
${item}
<button class="small-btn" onclick="addItem('${item}')">
Add
</button>
</div>
`;
});
}

function addItem(item){
shoppingList.push({
name:item,
done:false
});
save();
render();
}

function addCustom(){
let item=document.getElementById("customItem").value;
if(!item)return;
shoppingList.push({
name:item,
done:false
});
document.getElementById("customItem").value="";
save();
render();
}

function render(){
let box=document.getElementById("list");
box.innerHTML="";
shoppingList.forEach((item,index)=>{
box.innerHTML += `
<div class="shopping">
<input type="checkbox"
${item.done?"checked":""}
onclick="toggle(${index})">
<span class="${item.done?'done':''}">
${item.name}
</span>
<button class="small-btn"
onclick="removeItem(${index})">
Delete
</button>
</div>
`;
});
}

function toggle(i){
shoppingList[i].done = !shoppingList[i].done;
save();
render();
}

function removeItem(i){
shoppingList.splice(i,1);
save();
render();
}

function clearAll(){
shoppingList=[];
save();
render();
}

function save(){
localStorage.setItem(
"my2L_buy",
JSON.stringify(shoppingList)
);
}

showItems();
render();

</script>
