<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>What2Pic</title>

<style>
body{
    font-family:Arial;
    background:#f2f2f2;
    margin:20px;
}

h1{
    text-align:center;
}

#camera{
    width:100%;
    max-width:350px;
}

button{
    padding:10px 18px;
    margin-top:10px;
    cursor:pointer;
}

textarea{
    width:100%;
    height:80px;
    margin-top:10px;
    resize:vertical;
}

.card{
    background:white;
    padding:15px;
    margin-top:20px;
    border-radius:10px;
    box-shadow:0 2px 8px rgba(0,0,0,.15);
}

.card img{
    width:100%;
    border-radius:8px;
}

.time{
    color:gray;
    font-size:12px;
    margin-top:8px;
}

.delete{
    background:#d9534f;
    color:white;
    border:none;
    margin-top:10px;
}
</style>
</head>

<body>

<h1>📷 What2Pic</h1>

<video id="camera" autoplay playsinline></video>
<br>

<button id="capture">Take Picture</button>

<canvas id="canvas" style="display:none;"></canvas>

<div id="editor" style="display:none">

<h3>Preview</h3>

<img id="preview" width="350">

<textarea id="note" placeholder="Write your note here..."></textarea>

<br>

<button id="save">Save</button>

</div>

<hr>

<h2>Saved Photos</h2>

<div id="gallery"></div>

<script>

const video=document.getElementById("camera");
const canvas=document.getElementById("canvas");
const preview=document.getElementById("preview");

navigator.mediaDevices.getUserMedia({video:true})
.then(stream=>{
    video.srcObject=stream;
})
.catch(()=>{
    alert("Camera not available.");
});

document.getElementById("capture").onclick=function(){

    canvas.width=video.videoWidth;
    canvas.height=video.videoHeight;

    canvas.getContext("2d").drawImage(video,0,0);

    preview.src=canvas.toDataURL("image/jpeg");

    document.getElementById("editor").style.display="block";
}

document.getElementById("save").onclick=function(){

    let items=JSON.parse(localStorage.getItem("what2pic"))||[];

    items.unshift({
        photo:preview.src,
        note:document.getElementById("note").value,
        time:new Date().toLocaleString()
    });

    localStorage.setItem("what2pic",JSON.stringify(items));

    document.getElementById("note").value="";
    document.getElementById("editor").style.display="none";

    loadGallery();

}

function loadGallery(){

    const gallery=document.getElementById("gallery");

    let items=JSON.parse(localStorage.getItem("what2pic"))||[];

    gallery.innerHTML="";

    items.forEach((item,index)=>{

        gallery.innerHTML+=`
        <div class="card">

            <img src="${item.photo}">

            <p>${item.note}</p>

            <div class="time">${item.time}</div>

            <button class="delete" onclick="deleteItem(${index})">
            Delete
            </button>

        </div>
        `;

    });

}

function deleteItem(index){

    let items=JSON.parse(localStorage.getItem("what2pic"))||[];

    items.splice(index,1);

    localStorage.setItem("what2pic",JSON.stringify(items));

    loadGallery();

}

loadGallery();

</script>

</body>
</html>
